name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'dags/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'uv.lock'
      - '.github/workflows/ci-cd.yml'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          activate-environment: true

      - name: Install Dependencies
        run: uv sync

      - name: Run tests
        env:
          AWS_ENDPOINT_URL: http://localhost:3900
          AWS_ACCESS_KEY_ID: GK0123456789012345678901234567890123456789
          AWS_SECRET_ACCESS_KEY: 400db5aebbdb6e4d5a9bfe70c7d5277a4be996026f9452d3500ebe2734e4d185
          S3_BUCKET_NAME: ssdf-dev
        run: make test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Astro CLI
        uses: astronomer/setup-astro-cli@v0.0.1

      - name: Deploy to Astro
        uses: astronomer/deploy-action@v0.13.0
        env:
          ASTRO_API_TOKEN: ${{ secrets.ASTRO_API_TOKEN }}
        with:
          deployment-id: ${{ vars.ASTRO_DEPLOYMENT_ID }}
          wake-on-deploy: true

